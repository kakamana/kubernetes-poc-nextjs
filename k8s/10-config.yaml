apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  namespace: morohub-poc
data:
  NODE_ENV: "production"
  PORT: "5500"
  HOSTNAME: "0.0.0.0"
  AUTH_TRUST_HOST: "true"
  NEXT_TELEMETRY_DISABLED: "1"
---
apiVersion: v1
kind: Secret
metadata:
  name: web-secrets
  namespace: morohub-poc
type: Opaque
stringData:
  # Generate: openssl rand -base64 32
  AUTH_SECRET: "replace-with-openssl-rand-base64-32-value"
  # App points at the in-cluster primary Postgres service
  DATABASE_URL: "postgresql://morohub:morohub@postgres-primary:5432/morohub?schema=public"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: morohub-poc
type: Opaque
stringData:
  POSTGRES_USER: "morohub"
  POSTGRES_PASSWORD: "morohub"
  POSTGRES_DB: "morohub"
