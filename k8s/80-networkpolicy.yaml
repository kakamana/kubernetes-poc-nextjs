# Minimum-viable NetworkPolicies:
#   1. Postgres only accepts traffic from web pods in the same namespace.
#   2. Web pods accept traffic only from the ingress-nginx controller.
#
# Adjust labels/namespaces to match Morohub's cluster (e.g. their ingress
# controller may live in a different namespace with different labels).

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow-from-web
  namespace: morohub-poc
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: web
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web-allow-from-ingress
  namespace: morohub-poc
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: web
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
