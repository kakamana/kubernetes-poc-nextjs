# -----------------------------------------------------------------------------
# values.yaml for the Bitnami postgresql-ha Helm chart
#
# Installs a PostgreSQL cluster with 1 primary + N standby replicas, fronted by
# Pgpool-II for connection pooling + automatic failover. This is the
# "active / passive" HA mode you asked MoroHub to walk through.
#
# Install:
#   helm repo add bitnami https://charts.bitnami.com/bitnami
#   helm repo update
#   helm upgrade --install postgres-ha bitnami/postgresql-ha \
#     --namespace morohub-poc --create-namespace \
#     -f postgres-ha/values.yaml
#
# After install, point the Next.js app at Pgpool:
#   DATABASE_URL=postgresql://morohub:<password>@postgres-ha-pgpool:5432/morohub?schema=public
#
# Failover demo:
#   kubectl -n morohub-poc delete pod postgres-ha-postgresql-0    # kill the current primary
#   kubectl -n morohub-poc get pods -w                            # watch repmgr promote a replica
#   curl http(s)://<ingress>/api/ready                            # app stays healthy after a few seconds
# -----------------------------------------------------------------------------

global:
  postgresql:
    # Replace before committing to any real environment
    username: morohub
    password: morohub-change-me
    database: morohub
    repmgrUsername: repmgr
    repmgrPassword: repmgr-change-me

postgresql:
  replicaCount: 3                       # 1 primary + 2 standby — tolerates one node failure
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  persistence:
    enabled: true
    size: 8Gi
  podAntiAffinityPreset: hard           # schedule each replica on a separate node
  priorityClassName: ""

pgpool:
  replicaCount: 2                       # 2 Pgpool pods for HA in front of the cluster
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  adminUsername: admin
  adminPassword: pgpool-admin-change-me

service:
  type: ClusterIP                       # expose via the in-cluster service

metrics:
  enabled: true                         # Prometheus exporter on each node

volumePermissions:
  enabled: true

# Uncomment for TLS between Pgpool and the app
# tls:
#   enabled: true
#   autoGenerated: true
